services:
  - type: web
    name: sudarshan-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT --workers 1 --loop uvloop
    envVars:
      - key: DATABASE_URL
        sync: false         # set manually in Render dashboard
      - key: JWT_SECRET_KEY
        generateValue: true # Render generates a secure random value
      - key: JWT_ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "60"
      - key: DEBUG
        value: "false"
      - key: CORS_ORIGINS
        value: '["*"]'
    healthCheckPath: /health
